# ====== PostgreSQL 内存优化配置（4G 服务器） ======
# 总目标：让 PG 用 ~500MB，留 3.5G 给应用和系统

# 连接数（默认 100 太多，每个连接 ~10MB）
max_connections = 50

# 内存配置
shared_buffers = 128MB                  # 总内存的 1/32（保守）
effective_cache_size = 1GB              # 操作系统缓存预估（保守）
work_mem = 4MB                          # 每连接排序/哈希内存
maintenance_work_mem = 64MB             # VACUUM / 索引构建
wal_buffers = 4MB

# 写性能
synchronous_commit = off                # 换性能（崩溃可能丢 1s 数据，可接受）
checkpoint_completion_target = 0.9
max_wal_size = 512MB

# 查询计划
random_page_cost = 1.1                  # SSD 优化
effective_io_concurrency = 200

# 日志（少打日志省内存和 IO）
log_min_duration_statement = 1000       # 只记录慢查询（>1s）
log_checkpoints = off
log_connections = off
log_disconnections = off

# pgvector 向量索引
# shared_preload_libraries = ''          # 不需要预加载
