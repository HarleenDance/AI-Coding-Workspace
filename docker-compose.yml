# ====== 生产编排：4G 阿里云优化配置 ======
# 用法: docker compose up -d
# 停止: docker compose down

services:
  # 数据库：限制内存 + 调优
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-ide-db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ai_workspace_db
    # 不映射到宿主机，后端通过 Docker 内部网络 db:5432 访问
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    # 关键：限制内存，避免 OOM
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端
  backend:
    image: app-backend:latest
    pull_policy: missing
    container_name: ai-ide-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      AI_IDE_DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-123456}@db:5432/ai_workspace_db
      AI_IDE_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AI_IDE_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      UVICORN_WORKERS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./runtime:/app/runtime
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M

  # 前端（nginx）
  frontend:
    image: app-frontend:latest
    pull_policy: missing
    container_name: ai-ide-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  pgdata:
